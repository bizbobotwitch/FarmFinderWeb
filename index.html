    <!-- Tailwind CSS for styling -->

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        farm: {
                            50: '#f0fdf4',
                            100: '#dcfce7',

                    }

    <style>
        /* Ensures the map takes up the right amount of space */
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 0.5rem;

</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-farm-600 text-white shadow-md z-10 relative">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <h1 class="text-2xl font-bold tracking-tight">FarmFinder</h1>

                >
                <button

                >
                    <span id="search-text">Search</span>

                </button>

    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- Sidebar (List & Filters) -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-white shadow-xl flex flex-col h-[50vh] md:h-full z-10 overflow-hidden">
            
            <!-- Filters Section -->
            <div class="p-4 border-b border-gray-200 bg-gray-50">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Filter by Product</h2>
                <div class="flex flex-wrap gap-2" id="filter-container">
                    <!-- Filter buttons generated by JS -->
                </div>
            </div>

            <!-- Farm List Section -->
            <div class="flex-1 overflow-y-auto p-4 space-y-4 relative" id="farm-list-container">
                <div id="location-status" class="text-xs text-gray-500 mb-2 italic hidden">Showing farms near <span id="current-location-text">you</span></div>
                <div id="farm-list" class="space-y-4">
                    <!-- Farm cards generated by JS -->
                </div>
            </div>
            
        </aside>

        <!-- Map Area -->
        <div id="map" class="w-full md:w-2/3 lg:w-3/4 h-[50vh] md:h-full relative z-0"></div>

    </main>

    <!-- Leaflet JS for the Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // --- 1. DUMMY DATA ---
        // Added more farms spread out to demonstrate the zip code search zooming
        const farms = [
            // New York Area
            { id: 1, name: "Green Valley Dairy", type: "Dairy Farm", description: "Certified raw A2 milk, farm-fresh butter, and aged cheddar.", categories: ["Milk"], lat: 40.7128, lng: -74.1000, address: "123 Pasture Lane, NJ", contact: "(555) 123-4567" },
            { id: 2, name: "Heritage Meats Collective", type: "Ranch", description: "100% Grass-fed beef, pastured pork, and free-range chicken.", categories: ["Meat", "Eggs"], lat: 40.6500, lng: -74.2000, address: "450 Red Barn Rd, NJ", contact: "(555) 987-6543" },
            { id: 3, name: "Sunrise Organics", type: "Organic Farm", description: "Seasonal organic vegetables, honey, and fresh brown eggs.", categories: ["Produce", "Eggs"], lat: 40.7500, lng: -73.9500, address: "88 Sunny Side Ave, NY", contact: "(555) 444-3333" },
            
            // Pennsylvania Area (Horsham/Philly)
            { id: 6, name: "Penn's Woods Farm", type: "Mixed Farm", description: "Fresh produce and raw honey.", categories: ["Produce"], lat: 40.1800, lng: -75.1300, address: "Horsham, PA", contact: "(555) 888-0001" },
            { id: 7, name: "Liberty Pastures", type: "Ranch", description: "Grass-finished beef.", categories: ["Meat"], lat: 40.0000, lng: -75.2000, address: "Philadelphia Area, PA", contact: "(555) 888-0002" },

            // California Area
            { id: 8, name: "Cali Fresh Farms", type: "Produce Farm", description: "Avocados, citrus, and organic greens.", categories: ["Produce"], lat: 34.0522, lng: -118.2437, address: "Los Angeles, CA", contact: "(555) 999-0001" },
            { id: 9, name: "West Coast Dairy", type: "Dairy Farm", description: "Raw goat milk and artisanal cheese.", categories: ["Milk"], lat: 34.1000, lng: -118.3000, address: "LA County, CA", contact: "(555) 999-0002" }
        ];

        // --- 2. STATE MANAGEMENT ---
        const allCategories = ["Milk", "Meat", "Eggs", "Produce"];
        let activeFilters = new Set();
        let map;
        let markers = [];
        let userMarker = null; // Marker for the zip code location
        let currentSearchCircle = null; // Radius circle to show search area

        // --- 3. INITIALIZE MAP ---
        function initMap() {
            // Default center (US rough center)
            map = L.map('map').setView([39.8283, -98.5795], 4);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            renderFilters();
            updateApp();
            setupZipSearch();
        }

        // --- 4. ZIP CODE SEARCH LOGIC ---
        function setupZipSearch() {
            const searchBtn = document.getElementById('search-btn');
            const zipInput = document.getElementById('zip-input');

            // Allow hitting Enter key to search
            zipInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            searchBtn.addEventListener('click', performSearch);
        }

        async function performSearch() {
            const zipInput = document.getElementById('zip-input');
            const zipCode = zipInput.value.trim();
            const btnText = document.getElementById('search-text');
            const loader = document.getElementById('search-loader');
            const statusText = document.getElementById('location-status');
            const currentLocSpan = document.getElementById('current-location-text');

            // Basic validation
            if (!zipCode || zipCode.length < 5) {
                alert("Please enter a valid 5-digit ZIP code.");
                return;
            }

            // UI Loading state
            btnText.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                // Use a free geocoding API (Nominatim by OpenStreetMap)
                // Note: In a production app, you might want a more robust paid API for zip codes
                const response = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${zipCode}&country=US&format=json`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    const locationName = data[0].display_name.split(',')[0]; // Get city/town name roughly

                    // Update UI Status
                    statusText.classList.remove('hidden');
                    currentLocSpan.innerText = `${locationName} (${zipCode})`;

                    // Update Map
                    map.flyTo([lat, lon], 10, { duration: 1.5 });

                    // Remove old user marker/circle if they exist
                    if (userMarker) map.removeLayer(userMarker);
                    if (currentSearchCircle) map.removeLayer(currentSearchCircle);

                    // Add a marker for the searched location
                    userMarker = L.circleMarker([lat, lon], {
                        color: '#3b82f6', // Blue color for user
                        fillColor: '#3b82f6',
                        fillOpacity: 0.8,
                        radius: 8
                    }).addTo(map).bindPopup(`<b>Searched Location</b><br>ZIP: ${zipCode}`);

                    // Add a subtle circle to represent a "search radius" (e.g., ~20 miles)
                    currentSearchCircle = L.circle([lat, lon], {
                        color: '#3b82f6',
                        fillColor: '#3b82f6',
                        fillOpacity: 0.1,
                        radius: 32186 // approx 20 miles in meters
                    }).addTo(map);

                    // Optional: You could filter the list here to ONLY show farms within the radius.
                    // For this demo, we keep showing all filtered farms, but zooming map to location.
                    // We will re-sort the list so nearest farms are at the top.
                    sortFarmsByDistance(lat, lon);
                    updateApp();

                } else {
                    alert("Could not find that ZIP code. Please try again.");
                }
            } catch (error) {
                console.error("Geocoding error:", error);
                alert("An error occurred while searching. Please try again later.");
            } finally {
                // Reset UI Loading state
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }

        // Helper function to calculate distance using Haversine formula
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8; // Radius of the earth in miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            const d = R * c; // Distance in miles
            return d;
        }

        function sortFarmsByDistance(userLat, userLon) {
            farms.forEach(farm => {
                farm.distance = calculateDistance(userLat, userLon, farm.lat, farm.lng);
            });
            
            // Sort ascending by distance
            farms.sort((a, b) => a.distance - b.distance);
        }

        // --- 5. RENDER FILTERS ---
        function renderFilters() {
            const container = document.getElementById('filter-container');
            container.innerHTML = '';

            allCategories.forEach(cat => {
                const btn = document.createElement('button');
                const isActive = activeFilters.has(cat);
                
                btn.className = `px-3 py-1.5 rounded-full text-sm font-medium transition-colors border ${
                    isActive 
                    ? 'bg-farm-600 text-white border-farm-600' 
                    : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                }`;
                btn.innerText = cat;
                
                btn.onclick = () => {
                    if (activeFilters.has(cat)) {
                        activeFilters.delete(cat);
                    } else {
                        activeFilters.add(cat);
                    }
                    renderFilters(); 
                    updateApp();     
                };
                
                container.appendChild(btn);
            });
        }

        // --- 6. UPDATE APP (Map & List) ---
        function updateApp() {
            const filteredFarms = farms.filter(farm => {
                if (activeFilters.size === 0) return true;
                return farm.categories.some(cat => activeFilters.has(cat));
            });

            renderList(filteredFarms);
            renderMarkers(filteredFarms);
        }

        // --- 7. RENDER SIDEBAR LIST ---
        function renderList(filteredFarms) {
            const listContainer = document.getElementById('farm-list');
            listContainer.innerHTML = '';

            if (filteredFarms.length === 0) {
                listContainer.innerHTML = '<p class="text-gray-500 text-center mt-6">No farms found matching your filters.</p>';
                return;
            }

            filteredFarms.forEach(farm => {
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-100 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow cursor-pointer";
                
                const badges = farm.categories.map(c => 
                    `<span class="inline-block bg-farm-100 text-farm-800 text-xs px-2 py-1 rounded-md font-medium mr-1">${c}</span>`
                ).join('');

                // Display distance if it has been calculated (meaning user did a search)
                const distanceHtml = farm.distance !== undefined 
                    ? `<span class="text-xs font-semibold text-farm-600 ml-2">${farm.distance.toFixed(1)} miles away</span>` 
                    : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-gray-800">${farm.name}</h3>
                        <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded whitespace-nowrap">${farm.type}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3">${farm.description}</p>
                    <div class="mb-3">${badges}${distanceHtml}</div>
                    <div class="flex items-center text-xs text-gray-500 mt-2 pt-2 border-t border-gray-100">
                        <svg class="w-4 h-4 mr-1 text-gray-400 min-w-[16px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="truncate">${farm.address}</span>
                    </div>
                `;

                card.onclick = () => {
                    map.flyTo([farm.lat, farm.lng], 13, { duration: 1.5 });
                    const markerObj = markers.find(m => m.id === farm.id);
                    if (markerObj) markerObj.marker.openPopup();
                    
                    if (window.innerWidth < 768) {
                        document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
                    }
                };

                listContainer.appendChild(card);
            });
        }

        // --- 8. RENDER MAP MARKERS ---
        function renderMarkers(filteredFarms) {
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];

            const customIcon = L.divIcon({
                className: 'custom-icon',
                html: '<div class="farm-marker w-5 h-5"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            filteredFarms.forEach(farm => {
                const marker = L.marker([farm.lat, farm.lng], { icon: customIcon }).addTo(map);
                
                const popupContent = `
                    <div class="p-3">
                        <h4 class="font-bold text-gray-800 text-sm mb-1">${farm.name}</h4>
                        <p class="text-xs text-gray-600 mb-2">${farm.categories.join(', ')}</p>
                        <a href="tel:${farm.contact}" class="block w-full text-center bg-farm-600 hover:bg-farm-800 text-white text-xs font-bold py-2 rounded transition-colors">
                            Call ${farm.contact}
                        </a>
                    </div>
                `;

                marker.bindPopup(popupContent, { className: 'custom-popup' });
                markers.push({ id: farm.id, marker: marker });
            });
        }

        // --- 9. START THE APP ---
        document.addEventListener('DOMContentLoaded', initMap);

    </script>
</body>
</html>
